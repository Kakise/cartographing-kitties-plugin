repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^tests/
      - id: ruff-format
        exclude: ^tests/

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        args: [src]

  - repo: local
    hooks:
      - id: kitty-generate-agents
        name: kitty generate agents
        entry: uv run python scripts/generate_agents.py --check
        language: system
        pass_filenames: false
      - id: kitty-generate-manifests
        name: kitty generate manifests
        entry: uv run python scripts/generate_manifests.py --check
        language: system
        pass_filenames: false
      - id: kitty-validate-skills
        name: kitty validate skills
        entry: uv run python scripts/validate_skills.py
        language: system
        pass_filenames: false
