repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^tests/
      - id: ruff-format
        exclude: ^tests/

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies: [tomli]
        args: [src]

  - repo: local
    hooks:
      - id: kitty-generate-agents
        name: kitty generate agents
        entry: uv run python scripts/generate_agents.py --check
        language: system
        pass_filenames: false
      - id: kitty-generate-manifests
        name: kitty generate manifests
        entry: uv run python scripts/generate_manifests.py --check
        language: system
        pass_filenames: false
      - id: kitty-generate-tool-reference
        name: kitty generate tool reference
        entry: uv run python scripts/generate_tool_reference.py --check
        language: system
        pass_filenames: false
      - id: kitty-validate-skills
        name: kitty validate skills
        entry: uv run python scripts/validate_skills.py
        language: system
        pass_filenames: false
      - id: kitty-sync-claude-agents-md
        name: kitty sync CLAUDE.md/AGENTS.md
        entry: uv run python scripts/sync_claude_agents_md.py --check
        language: system
        pass_filenames: false
        files: ^(CLAUDE\.md|AGENTS\.md|scripts/sync_claude_agents_md\.py)$
      - id: kitty-plan-status
        name: kitty plan status audit
        entry: uv run python scripts/plan_status.py audit
        language: system
        pass_filenames: false
        files: ^docs/plans/.*\.md$
