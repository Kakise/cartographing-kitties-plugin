name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          enable-cache: true
          python-version: "3.13"

      - name: Set up Python
        run: uv python install

      - name: Install all dependencies
        run: uv sync --all-extras

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Install all dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate plugin.json
        run: python -c "import json, sys; d=json.load(open('plugins/kitty/.claude-plugin/plugin.json')); assert 'name' in d; assert 'mcpServers' in d; print('plugin.json valid')"

      - name: Validate marketplace.json
        run: python -c "import json, sys; d=json.load(open('.claude-plugin/marketplace.json')); assert 'name' in d; assert 'plugins' in d; print('marketplace.json valid')"

      - name: Validate skill files exist
        run: |
          count=$(find plugins/kitty/skills -mindepth 1 -maxdepth 1 -type d -exec test -f {}/SKILL.md \; -print | wc -l | tr -d ' ')
          echo "Found $count skills"
          if [ "$count" -lt 9 ]; then
            echo "ERROR: Expected at least 9 skills, found $count"
            find plugins/kitty/skills -mindepth 1 -maxdepth 1 -type d | sort
            exit 1
          fi
          echo "All skill files present"

      - name: Validate agent files exist
        run: |
          count=$(find plugins/kitty/agents -name '*.md' -type f | wc -l | tr -d ' ')
          echo "Found $count agents"
          if [ "$count" -lt 9 ]; then
            echo "ERROR: Expected at least 9 agents, found $count"
            find plugins/kitty/agents -name '*.md' -type f | sort
            exit 1
          fi
          echo "All agent files present"
