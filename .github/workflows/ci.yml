name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python
        run: uv python install

      - name: Install all dependencies
        run: uv sync --all-extras

      - name: Run linting
        run: |
          uv run ruff check src/
          uv run ruff format --check src/

      - name: Run spell check
        run: uv run codespell src

      - name: Run type checking
        run: uv run basedpyright --level error

      - name: Run tests
        run: uv run pytest

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate plugin.json
        run: python -c "import json, sys; d=json.load(open('.claude-plugin/plugin.json')); assert 'name' in d; assert 'mcpServers' in d; print('plugin.json valid')"

      - name: Validate skill files exist
        run: |
          test -f skills/cartograph/SKILL.md
          test -f skills/cartograph-explore/SKILL.md
          test -f skills/cartograph-impact/SKILL.md
          test -f skills/cartograph-annotate/SKILL.md
          echo "All skill files present"

      - name: Validate agent files exist
        run: |
          test -f agents/cartograph-annotator.md
          echo "All agent files present"
