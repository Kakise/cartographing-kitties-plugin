plugin:
  name: kitty
  version: 1.1.0
  description_short: AST-powered codebase intelligence for AI coding agents.
  description_long: AST-powered codebase intelligence for AI coding agents — dependency mapping, impact analysis, and semantic search via tree-sitter parsing and SQLite graph storage.
  author:
    name: Kakise
    email: cartographing-kittens@a-smol-cat.fr
    url: https://a-smol-cat.fr
  homepage: https://github.com/Kakise/cartographing-kitties-plugin
  repository: https://github.com/Kakise/cartographing-kitties-plugin
  license: MIT
  keywords:
    - codebase-intelligence
    - ast
    - tree-sitter
    - dependency-graph
    - impact-analysis
    - mcp
    - code-navigation

paths:
  commands: ./commands
  codex_plugin_skills: ./skills
  codex_plugin_mcp: ./.mcp.json
  codex_root_skills: ./plugins/kitty/skills
  codex_root_mcp: ./plugins/kitty/.mcp.json

mcp:
  command: uvx
  args:
    - cartographing-kittens
  env:
    KITTY_PROJECT_ROOT: "."

interface:
  displayName: Cartographing Kittens
  shortDescription: Graph-powered codebase intelligence for Codex.
  longDescription: Explore structure, trace dependencies, assess blast radius, and run semantic code search through an MCP-backed AST graph.
  developerName: Kakise
  category: Developer Tools
  capabilities:
    - Interactive
    - Read
    - Write
  websiteURL: https://github.com/Kakise/cartographing-kitties-plugin
  privacyPolicyURL: https://github.com/Kakise/cartographing-kitties-plugin
  termsOfServiceURL: https://github.com/Kakise/cartographing-kitties-plugin
  defaultPrompt:
    - Map the main modules in this repo.
    - What depends on this symbol?
    - Find auth-related code paths.
  brandColor: "#f59e0b"
